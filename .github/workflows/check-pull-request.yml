name: Check Pull Request

on:
  pull_request:
    branches:
      - '*'
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  pr-prep:
    name: Preparation
    runs-on: ubuntu-latest
    steps:
      - name: Prepare PR
        uses: DEFRA/epr-re-ex-service/.github/actions/pr-preparation@main

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: pr-prep
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Test and Scan
        uses: DEFRA/epr-re-ex-service/.github/actions/test-and-scan@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          build-command: npm run build

      - name: Run translations check (non-blocking for now)
        run: npm run check:i18n
        continue-on-error: true #FIXME: 🚨 Make this a blocking step after translations are available

  type-check-prod:
    name: Lint Types - Prod
    runs-on: ubuntu-latest
    needs: pr-prep
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: DEFRA/epr-re-ex-service/.github/actions/lint-types@main
        with:
          npm-script: lint:types
          tsconfig: jsconfig.typecheck.json
          label: Prod
          comment-header: lint-types-prod
          fail-on: all

  type-check-tests:
    name: Lint Types - Tests
    runs-on: ubuntu-latest
    needs: pr-prep
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: DEFRA/epr-re-ex-service/.github/actions/lint-types@main
        with:
          fail-on: all

  typecheck-burndown:
    name: Typecheck strictness burndown
    runs-on: ubuntu-latest
    needs: pr-prep
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: DEFRA/epr-re-ex-service/.github/actions/typecheck-burndown@main

  test-journey:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    needs: pr-prep
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check for matching journey test branch
        id: journey-branch
        run: |
          BRANCH="${{ github.head_ref }}"
          if git -c credential.helper= ls-remote --heads https://github.com/DEFRA/epr-re-ex-journey-tests.git "$BRANCH" | grep -q .; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Record build start time
        id: build-timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - run: docker build -t defradigital/epr-frontend:${{github.sha}} .

      - name: Record test start time
        id: test-timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run journey tests on ${{ steps.journey-branch.outputs.ref }}
        uses: DEFRA/epr-re-ex-journey-tests/run-journey-tests@main
        with:
          epr-frontend: ${{github.sha}}
          branch: ${{ steps.journey-branch.outputs.ref }}

      - name: Write journey test summary
        if: always()
        uses: DEFRA/epr-re-ex-service/.github/actions/journey-test-summary@main
        with:
          build-start: ${{ steps.build-timer.outputs.start }}
          test-start: ${{ steps.test-timer.outputs.start }}
